name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck, lint, format, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run check
        env:
          ADMIN_TOKEN: ci-admin-token
          SERVICE_TOKEN: ci-service-token

      - run: npm run test:coverage
        env:
          ADMIN_TOKEN: ci-admin-token
          SERVICE_TOKEN: ci-service-token
